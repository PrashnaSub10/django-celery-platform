# ============================================================
# docker-compose.monitoring.yml — Dedicated Monitoring Layer
# ============================================================
# Connects to the celery stack to expose dashboards and metrics.
# Completely optional — attach or detach at will.
# 
# Start: docker compose -f docker-compose.monitoring.yml --env-file .docker.env --env-file .env.secrets up -d
# ============================================================

services:

  # ── Prometheus (Metrics Scraper) ──────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-shared
    restart: always
    ports:
      - "127.0.0.1:${PORT_PROMETHEUS:-9090}:9090"
    # Using a custom entrypoint to allow envsubst on prometheus.yml.
    # The entire ./prometheus directory is mounted at /prometheus-config so
    # individual file mounts (which become empty directories on Windows/Docker
    # Desktop) are avoided. The entrypoint reads from /prometheus-config and
    # writes the rendered config to /etc/prometheus/prometheus.yml.
    entrypoint: [ "/bin/sh", "/prometheus-config/docker-entrypoint.sh" ]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus:/prometheus-config:ro
      - prometheus_data:/prometheus
    environment:
      - METRICS_TARGET_HOST=${METRICS_TARGET_HOST:-host.docker.internal}
      - METRICS_TARGET_PORT=${METRICS_TARGET_PORT:-9845}
      - PROMETHEUS_ENVIRONMENT=${PROMETHEUS_ENVIRONMENT:-production}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - celery-broker-net  # Connects to exporters in same network segment
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Grafana (Visualization Dashboards) ─────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-shared
    restart: always
    ports:
      - "127.0.0.1:${PORT_GRAFANA:-8300}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be strictly configured in .env.secrets (run ./init-secrets.sh)}
      - GF_USERS_ALLOW_SIGN_UP=${GRAFANA_ALLOW_SIGN_UP:-false}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - celery-broker-net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Redis Exporter ─────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter-shared
    restart: always
    ports:
      - "127.0.0.1:${PORT_REDIS_EXPORTER:-9121}:9121"
    environment:
      - REDIS_ADDR=redis://celery-redis-shared:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required in .env.secrets to query metrics securely.}
      - REDIS_EXPORTER_LOG_FORMAT=json
    networks:
      - celery-broker-net

  # ── RabbitMQ Exporter ──────────────────────────────────────
  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:latest
    container_name: rabbitmq-exporter-shared
    restart: always
    ports:
      - "127.0.0.1:${PORT_RABBITMQ_EXPORTER:-9419}:9419"
    environment:
      - RABBIT_URL=http://celery-rabbitmq-shared:15672
      - RABBIT_USER=${RABBITMQ_USER:?RABBITMQ_USER required in .env.secrets}
      - RABBIT_PASSWORD=${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required in .env.secrets}
      - RABBIT_EXPORTERS=exchange,node,queue
      - PUBLISH_PORT=9419
      - OUTPUT_FORMAT=JSON
    networks:
      - celery-broker-net

  # ── Celery Exporter — Redis broker ─────────────────────────
  celery-exporter-redis:
    image: danihodovic/celery-exporter:latest
    container_name: celery-exporter-redis
    restart: always
    ports:
      - "127.0.0.1:${PORT_CELERY_EXPORTER_REDIS:-9808}:9808"
    command:
      - '--broker-url=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@celery-redis-shared:6379/0'
      - '--port=9808'
    networks:
      - celery-broker-net
    depends_on:
      - redis-exporter

  # ── Celery Exporter — RabbitMQ broker ──────────────────────
  celery-exporter-rabbitmq:
    image: danihodovic/celery-exporter:latest
    container_name: celery-exporter-rabbitmq
    restart: always
    ports:
      - "127.0.0.1:${PORT_CELERY_EXPORTER_RABBITMQ:-9809}:9808"
    command:
      - '--broker-url=amqp://${RABBITMQ_USER:?RABBITMQ_USER required}:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}@celery-rabbitmq-shared:5672//'
      - '--port=9808'
    networks:
      - celery-broker-net
    depends_on:
      - rabbitmq-exporter

  # ── Node Exporter (host metrics) ────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter-shared
    restart: always
    ports:
      - "127.0.0.1:${PORT_NODE_EXPORTER:-9100}:9100"
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    networks:
      - celery-broker-net

  # ── Nginx Exporter ──────────────────────────────────────────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter-shared
    restart: always
    ports:
      - "127.0.0.1:${PORT_NGINX_EXPORTER:-9113}:9113"
    command:
      - '-nginx.scrape-uri=http://celery-nginx-shared:8080/stub_status'
    networks:
      - celery-broker-net

  # ── Alertmanager ────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager-shared
    restart: always
    ports:
      - "127.0.0.1:${PORT_ALERTMANAGER:-9093}:9093"
    volumes:
      - ./prometheus:/prometheus-config:ro
      - alertmanager_data:/alertmanager
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PAGERDUTY_INTEGRATION_KEY=${PAGERDUTY_INTEGRATION_KEY:-}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
    command:
      - '--config.file=/prometheus-config/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - celery-broker-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Volumes ─────────────────────────────────────────────────
volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local

# ── Network ─────────────────────────────────────────────────
# Joins the existing celery broker network so Prometheus can scrape the exporters
networks:
  celery-broker-net:
    external: true
    name: celery-broker-net
