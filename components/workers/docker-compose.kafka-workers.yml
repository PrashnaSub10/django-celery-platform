# ============================================================
# docker-compose.kafka-workers.yml — Kafka worker services
# ============================================================
# Loaded automatically when BROKER_MODE=kafka.
#
# What this adds on top of docker-compose.workers.yml:
#
#   worker-kafka
#     A Celery worker consuming from Kafka topics via the
#     confluentkafka transport.  Designed for high-throughput
#     streaming workloads: event ingestion, log aggregation,
#     data pipeline stages, analytics events, audit trails.
#
#   flower-kafka  :5558
#     Flower monitoring instance for Kafka workers.
#
#   celery-beat-kafka
#     A Beat scheduler that dispatches periodic tasks to
#     Kafka topics.  When BROKER_MODE=kafka, this replaces
#     celery-beat (which is scaled to 0 via kafka-broker.yml).
#
# Prerequisites:
#   - docker-compose.brokers.yml must be running (Kafka + Redis)
#   - celery-broker-net must exist (created by brokers component)
#   - Redis stays active as result backend even in Kafka mode
# ============================================================

# ── Shared base (mirrors docker-compose.workers.yml anchor) ──
x-kafka-worker-base: &kafka-worker-base
  image: ${WORKER_IMAGE:-celery-microservice:base}
  entrypoint: ["/docker-entrypoint.sh"]
  restart: always
  working_dir: /app
  volumes:
    - worker_logs:/app/logs
  environment:
    - PYTHONPATH=/app
    - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.production}
    - CONTAINER_ENV=true
    - EXTRA_PIP_PACKAGES=${EXTRA_PIP_PACKAGES:-}
    - REDIS_HOST=${REDIS_HOST:-celery-redis-shared}
    - REDIS_PORT=${REDIS_PORT:-6379}
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - KAFKA_HOST=${KAFKA_HOST:-celery-kafka-shared}
    - KAFKA_PORT=${KAFKA_PORT:-9092}
    - TZ=${TZ:-UTC}
    - CODE_SOURCE=${CODE_SOURCE:-bind}
    - APP_GIT_URL=${APP_GIT_URL:-}
    - APP_GIT_BRANCH=${APP_GIT_BRANCH:-}
    - APP_PIP_PACKAGE=${APP_PIP_PACKAGE:-}
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  networks:
    - celery-broker-net

services:

  # ── Kafka Worker (Prefork) ────────────────────────────────
  # High-throughput streaming tasks.  Uses prefork pool for
  # CPU-bound work (Kafka handles I/O-bound queueing).
  worker-kafka:
    <<: *kafka-worker-base
    container_name: ${PROJECT_NAME:-app}-worker-kafka
    command: >
      python3 -m celery -A ${CELERY_APP_KAFKA:-config.celery_hybrid:app_kafka} worker
      --loglevel=${LOG_LEVEL:-info}
      -P ${KAFKA_POOL:-prefork}
      --concurrency=${KAFKA_CONCURRENCY:-4}
      -Q ${CELERY_KAFKA_QUEUE:-kafka_queue}
      --hostname=streaming@%h
      --max-tasks-per-child=${KAFKA_MAX_TASKS:-500}
      --max-memory-per-child=${KAFKA_MAX_MEMORY:-300000}
      --prefetch-multiplier=1
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.production}
      - CONTAINER_ENV=true
      - EXTRA_PIP_PACKAGES=${EXTRA_PIP_PACKAGES:-}
      - REDIS_HOST=${REDIS_HOST:-celery-redis-shared}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_HOST=${KAFKA_HOST:-celery-kafka-shared}
      - KAFKA_PORT=${KAFKA_PORT:-9092}
      - WAIT_FOR_KAFKA=true
      - WAIT_FOR_REDIS=true
    healthcheck:
      test: ["CMD-SHELL", "python3 -m celery -A ${CELERY_APP_KAFKA:-config.celery_hybrid:app_kafka} inspect ping -d streaming@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ── Flower — Kafka Monitor ───────────────────────────────
  flower-kafka:
    <<: *kafka-worker-base
    container_name: ${PROJECT_NAME:-app}-flower-kafka
    command: >
      python3 -m celery -A ${CELERY_APP_KAFKA:-config.celery_hybrid:app_kafka} flower
      --port=5558
      --basic_auth=${FLOWER_USER:?FLOWER_USER missing}:${FLOWER_PASSWORD:?FLOWER_PASSWORD missing in .env.secrets}
      --max-tasks=${FLOWER_MAX_TASKS:-10000}
      --purge_offline_workers=${FLOWER_PURGE_OFFLINE:-3600}
    ports:
      - "127.0.0.1:${FLOWER_PORT_KAFKA:-5558}:5558"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5558/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ── Kafka Beat — schedules tasks to Kafka topics ──────────
  # A single Beat process that dispatches periodic tasks via
  # the Kafka Celery app.  Only one Beat process should run
  # per deployment.  When BROKER_MODE=kafka, this replaces
  # celery-beat (scaled to 0 in kafka-broker.yml).
  celery-beat-kafka:
    <<: *kafka-worker-base
    container_name: ${PROJECT_NAME:-app}-beat-kafka
    command: >
      python3 -m celery -A ${CELERY_APP_KAFKA:-config.celery_hybrid:app_kafka} beat
      --loglevel=${LOG_LEVEL:-info}
      --pidfile=/tmp/celerybeat-kafka.pid
      --schedule=/app/beat_data/celerybeat-kafka-schedule.db
    volumes:
      - beat_data:/app/beat_data
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.production}
      - CONTAINER_ENV=true
      - EXTRA_PIP_PACKAGES=${EXTRA_PIP_PACKAGES:-}
      - REDIS_HOST=${REDIS_HOST:-celery-redis-shared}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_HOST=${KAFKA_HOST:-celery-kafka-shared}
      - KAFKA_PORT=${KAFKA_PORT:-9092}
      - WAIT_FOR_KAFKA=true
      - WAIT_FOR_REDIS=true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

# ── Volumes (shared with docker-compose.workers.yml) ─────────
volumes:
  worker_logs:
    driver: local
  beat_data:
    driver: local

# ── Network ──────────────────────────────────────────────────
networks:
  celery-broker-net:
    external: true
    name: celery-broker-net
