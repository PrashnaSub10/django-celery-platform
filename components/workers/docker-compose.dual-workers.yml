# ============================================================
# docker-compose.dual-workers.yml — Hybrid worker monitoring
# ============================================================
# Loaded automatically when WORKER_MODE=dual (BROKER_MODE=hybrid
# is a prerequisite — up.sh enforces this).
#
# What this adds on top of docker-compose.workers.yml:
#
#   flower-hybrid  :5557
#     A single Flower instance that connects to BOTH the Redis
#     and RabbitMQ Celery apps.  Operators get one URL to see
#     all workers — fast (gevent/Redis) and critical (solo/RabbitMQ)
#     — side by side, with unified task history and failure rates.
#
#   worker-hybrid-beat
#     A dedicated Beat scheduler that is aware of both broker
#     apps.  Replaces running two separate Beat processes when
#     periodic tasks need to dispatch to either broker.
#     Uses the Redis app as the scheduler backend (django-celery-beat
#     stores the schedule in the DB, not in Redis state).
#
# Prerequisites:
#   - docker-compose.workers.yml must be loaded first
#     (worker-fast and worker-critical must exist)
#   - BROKER_MODE=hybrid (both brokers must be running)
#   - celery-broker-net must exist (created by brokers component)
# ============================================================

# ── Shared base (mirrors docker-compose.workers.yml anchor) ──
x-dual-worker-base: &dual-worker-base
  image: ${WORKER_IMAGE:-celery-microservice:base}
  entrypoint: ["/docker-entrypoint.sh"]
  restart: always
  working_dir: /app
  volumes:
    - worker_logs:/app/logs
  environment:
    - PYTHONPATH=/app
    - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.production}
    - CONTAINER_ENV=true
    - EXTRA_PIP_PACKAGES=${EXTRA_PIP_PACKAGES:-}
    - REDIS_HOST=${REDIS_HOST:-celery-redis-shared}
    - REDIS_PORT=${REDIS_PORT:-6379}
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - RABBITMQ_HOST=${RABBITMQ_HOST:-celery-rabbitmq-shared}
    - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
    - RABBITMQ_USER=${RABBITMQ_USER}
    - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    - TZ=${TZ:-UTC}
    - CODE_SOURCE=${CODE_SOURCE:-bind}
    - APP_GIT_URL=${APP_GIT_URL:-}
    - APP_GIT_BRANCH=${APP_GIT_BRANCH:-}
    - APP_PIP_PACKAGE=${APP_PIP_PACKAGE:-}
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  networks:
    - celery-broker-net

services:

  # ── Flower Hybrid — monitors BOTH worker pools ────────────
  # Connects to app_redis to inspect fast workers and to
  # app_rabbitmq to inspect critical workers.  Both worker
  # pools appear in a single dashboard at :5557.
  #
  # Why a separate port from flower-redis (:5555) and
  # flower-rabbitmq (:5556)?  The per-broker Flower instances
  # remain available for broker-specific deep-dives.  The hybrid
  # instance is the operator's default view in dual mode.
  flower-hybrid:
    <<: *dual-worker-base
    container_name: ${PROJECT_NAME:-app}-flower-hybrid
    # Flower supports multiple broker URLs via --broker and
    # --broker_api for the secondary broker's management API.
    command: >
      python3 -m celery -A ${CELERY_APP_REDIS:-config.celery_hybrid:app_redis} flower
      --port=5557
      --basic_auth=${FLOWER_USER:?FLOWER_USER missing}:${FLOWER_PASSWORD:?FLOWER_PASSWORD missing in .env.secrets}
      --broker_api=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@${RABBITMQ_HOST:-celery-rabbitmq-shared}:${RABBITMQ_PORT:-5672}//
      --max-tasks=${FLOWER_MAX_TASKS:-10000}
      --purge_offline_workers=${FLOWER_PURGE_OFFLINE:-3600}
    ports:
      - "127.0.0.1:${FLOWER_PORT_HYBRID:-5557}:5557"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5557/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ── Hybrid Beat — schedules across both brokers ───────────
  # A single Beat process that can dispatch periodic tasks to
  # either the Redis queue or the RabbitMQ queue depending on
  # the task's routing_key.  Uses the Redis app as the Beat
  # backend because django-celery-beat persists the schedule
  # in the database, not in broker state.
  #
  # Only one Beat process should run per deployment.
  # When WORKER_MODE=dual, this service replaces the
  # celery-beat service from docker-compose.workers.yml
  # (celery-beat is scaled to 0 in worker.dual.env).
  worker-hybrid-beat:
    <<: *dual-worker-base
    container_name: ${PROJECT_NAME:-app}-beat-hybrid
    command: >
      python3 -m celery -A ${CELERY_APP_REDIS:-config.celery_hybrid:app_redis} beat
      --loglevel=${LOG_LEVEL:-info}
      --pidfile=/tmp/celerybeat-hybrid.pid
      --schedule=/app/beat_data/celerybeat-schedule.db
    volumes:
      - beat_data:/app/beat_data
    environment:
      - PYTHONPATH=/app
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.production}
      - CONTAINER_ENV=true
      - EXTRA_PIP_PACKAGES=${EXTRA_PIP_PACKAGES:-}
      - REDIS_HOST=${REDIS_HOST:-celery-redis-shared}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-celery-rabbitmq-shared}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - WAIT_FOR_REDIS=true
      - WAIT_FOR_RABBITMQ=true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

# ── Volumes (shared with docker-compose.workers.yml) ─────────
volumes:
  worker_logs:
    driver: local
  beat_data:
    driver: local

# ── Network ──────────────────────────────────────────────────
networks:
  celery-broker-net:
    external: true
    name: celery-broker-net
