# ============================================================
# docker-compose.kafka-workers.code-volume.yml — CODE_SOURCE=volume overlay
# ============================================================
# Loaded automatically by up.sh when BROKER_MODE=kafka and
# CODE_SOURCE=volume.  Mounts the named Docker volume into
# Kafka worker containers at /app.
# ============================================================

services:
  worker-kafka:
    volumes:
      - app_code:/app

  flower-kafka:
    volumes:
      - app_code:/app

  celery-beat-kafka:
    volumes:
      - app_code:/app

volumes:
  app_code:
    external: true
    name: ${APP_VOLUME_NAME:?APP_VOLUME_NAME must be set when CODE_SOURCE=volume}
