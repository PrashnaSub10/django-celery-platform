{{/*
============================================================
secrets.yaml — Platform secrets
============================================================
Maps to .env.secrets in the Docker Compose runtime.
In production, consider using:
  - External Secrets Operator → AWS Secrets Manager / Vault
  - Sealed Secrets → encrypted in Git
  - CSI Secrets Store → mounted from Vault
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "celery-platform.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "celery-platform.labels" . | nindent 4 }}
type: Opaque
data:
  redis-password: {{ .Values.redis.password | b64enc | quote }}
  {{- if include "celery-platform.rabbitmqEnabled" . }}
  rabbitmq-password: {{ .Values.rabbitmq.password | b64enc | quote }}
  {{- end }}
  flower-user: {{ .Values.flower.user | b64enc | quote }}
  flower-password: {{ .Values.flower.password | b64enc | quote }}
  {{- if and (include "celery-platform.observabilityEnabled" .) .Values.observability.grafana.enabled }}
  grafana-admin-password: {{ .Values.observability.grafana.adminPassword | b64enc | quote }}
  {{- end }}
