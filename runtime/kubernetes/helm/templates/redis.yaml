{{/*
============================================================
redis.yaml — Redis StatefulSet + Service
============================================================
Maps to: components/brokers/docker-compose.brokers.yml (redis)
Always deployed — acts as both broker and result backend.
*/}}
{{- if .Values.redis.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "celery-platform.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "celery-platform.labels" . | nindent 4 }}
    {{- include "celery-platform.selectorLabels" (dict "component" "redis" "context" .) | nindent 4 }}
spec:
  serviceName: {{ include "celery-platform.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "celery-platform.selectorLabels" (dict "component" "redis" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "celery-platform.selectorLabels" (dict "component" "redis" "context" .) | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          ports:
            - containerPort: {{ .Values.redis.port }}
              name: redis
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - {{ .Values.redis.maxMemory | quote }}
            - --maxmemory-policy
            - {{ .Values.redis.maxMemoryPolicy | quote }}
            - --requirepass
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "celery-platform.fullname" . }}-secrets
                  key: redis-password
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          {{- if .Values.redis.persistence.enabled }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
          {{- end }}
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redis.persistence.storageClass }}
        storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "celery-platform.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "celery-platform.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: redis
      name: redis
  selector:
    {{- include "celery-platform.selectorLabels" (dict "component" "redis" "context" .) | nindent 4 }}
{{- end }}
